version: '3.8'

# This compose file is designed for Dokploy deployment
# Dokploy will manage the PostgreSQL service externally
# Reference it via the DATABASE_URL or individual DB_* env vars

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      - NODE_ENV=production
      - PORT=5000
      # These will be overridden by Dokploy's service connections
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-mikrotik_config_builder}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-32-chars}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      # Optional integrations
      - AT_API_KEY=${AT_API_KEY:-}
      - AT_USERNAME=${AT_USERNAME:-sandbox}
      - AT_SENDER_ID=${AT_SENDER_ID:-MyISP}
      - MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY:-}
      - MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET:-}
      - MPESA_SHORTCODE=${MPESA_SHORTCODE:-174379}
      - MPESA_PASSKEY=${MPESA_PASSKEY:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
    ports:
      - "5000:5000"
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        until nc -z ${DB_HOST:-postgres} ${DB_PORT:-5432}; do sleep 1; done &&
        echo 'Database is ready!' &&
        npm run db:migrate &&
        npm run db:seed &&
        npm start
      "
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

# Note: PostgreSQL is managed by Dokploy as a separate service
# Dokploy will inject the DB_* environment variables automatically
# If you want local dev with docker-compose, uncomment below:
#
#   postgres:
#     image: postgres:15-alpine
#     environment:
#       - POSTGRES_DB=mikrotik_config_builder
#       - POSTGRES_USER=postgres
#       - POSTGRES_PASSWORD=postgres
