# FreeRADIUS Server Configuration
# Integrated with PostgreSQL for MikroTik Config Builder

radiusd {
    max_requests = 1024
    cleanup_delay = 5
    max_request_time = 30
    
    log {
        destination = files
        file {
            filename = ${logdir}/radius.log
            permissions = 0640
        }
        syslog_facility = daemon
        stripped_names = no
    }
    
    checkrad = ${radacctdir}/checkrad
    proxy_requests = no
    
    security {
        max_attributes = 200
        reject_delay = 1.0
        status_server = yes
    }
}

thread pool {
    start_servers = 5
    max_servers = 32
    min_spare_servers = 3
    max_spare_servers = 10
    max_requests_per_server = 0
    auto_limit_acct = no
}

modules {
    # Load SQL module for database integration
    sql
    
    # Expiration module for user accounts
    expiration {
        usercheck = "Expiration"
    }
    
    # Login time restrictions
    logintime {
        reply-message = "You are calling outside your allowed timespan"
        minimum-timeout = 60
    }
}

instantiate {
    sql
    expiration
    logintime
}

authorize {
    preprocess
    chap
    mschap
    digest
    suffix
    sql
    expiration
    logintime
    pap
}

authenticate {
    Auth-Type PAP {
        pap
    }
    Auth-Type CHAP {
        chap
    }
    Auth-Type MS-CHAP {
        mschap
    }
}

preacct {
    preprocess
    acct_unique
    suffix
}

accounting {
    detail
    sql
    exec
    attr_filter.accounting_response
}

post-auth {
    sql
    exec
    Post-Auth-Type REJECT {
        sql
        attr_filter.access_reject
    }
}

pre-proxy {
}

post-proxy {
}
