# FreeRADIUS Clients Configuration
# This file defines which NAS (Network Access Server) devices can send RADIUS requests
# Each MikroTik router should be added as a client

# Default client for testing
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = "other"
}

