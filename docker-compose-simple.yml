version: '3.8'

# Simple Docker Compose for VPS Deployment
# One command: docker-compose up -d
# Everything included: Database + Server + Frontend

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mikrotik-db
    environment:
      - POSTGRES_DB=mikrotik_config_builder
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_secure_password_123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 512M

  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: mikrotik-server
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mikrotik_config_builder
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres_secure_password_123}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_change_this}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your_encryption_key_32_chars}
      - CORS_ORIGIN=http://localhost:80
    depends_on:
      postgres:
        condition: service_healthy
    # Wait for DB, run migrations, then start
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        for i in $(seq 1 30); do
          if nc -z postgres 5432 2>/dev/null; then
            echo 'Database ready!' &&
            npm run db:migrate &&
            npm run db:seed &&
            npm start &&
            break
          fi
          echo \"Waiting for DB... attempt $$i/30\" &&
          sleep 2
        done
      "
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 512M

  # Frontend Client (Nginx)
  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    container_name: mikrotik-client
    environment:
      - VITE_API_URL=/api
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
    driver: local

networks:
  mikrotik-net:
    driver: bridge
