version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=mikrotik_config_builder
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./radius/radius_schema.sql:/docker-entrypoint-initdb.d/radius_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 512M

  # FreeRADIUS Server
  radius:
    build:
      context: ./radius
      dockerfile: Dockerfile.radius
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres_secret}
      - RADIUS_DB_NAME=radius_db
      - RUN_RADIUS_MIGRATIONS=true
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./radius/clients.conf:/etc/freeradius/3.0/clients.conf
      - ./radius/mods-available/sql:/etc/freeradius/3.0/mods-available/sql
      - ./radius/radiusd.conf:/etc/freeradius/3.0/radiusd.conf
      - radius_logs:/var/log/freeradius
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 256M

  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mikrotik_config_builder
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres_secret}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-32-chars}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - RADIUS_ENABLED=true
      - RADIUS_HOST=radius
      - RADIUS_PORT=1812
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
      # Optional integrations
      - AT_API_KEY=${AT_API_KEY:-}
      - AT_USERNAME=${AT_USERNAME:-sandbox}
      - AT_SENDER_ID=${AT_SENDER_ID:-MyISP}
      - MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY:-}
      - MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET:-}
      - MPESA_SHORTCODE=${MPESA_SHORTCODE:-174379}
      - MPESA_PASSKEY=${MPESA_PASSKEY:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      radius:
        condition: service_started
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        until nc -z postgres 5432; do sleep 1; done &&
        echo 'Database is ready!' &&
        npm run db:migrate &&
        npm run db:seed &&
        npm start
      "
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 512M

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    environment:
      - VITE_API_URL=/api
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  radius_logs:

networks:
  mikrotik-net:
    driver: bridge
