services:
  app:
    image: node:18-alpine
    command: sh -c "cd /app/server && npm install && npm run db:migrate && npm run db:seed && npm start"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mikrotik_config_builder
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres_secret}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: node:18-alpine
    command: sh -c "cd /app/client && npm install && npm run build && npx serve -s dist -l 3000"
    environment:
      - VITE_API_URL=/api
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=mikrotik_config_builder
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
