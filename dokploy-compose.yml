version: '3.8'

# Complete Docker Compose for Dokploy Deployment
# Includes both PostgreSQL database and application server
# Self-contained - no external database service required

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mikrotik-db
    environment:
      - POSTGRES_DB=${DB_NAME:-mikrotik_config_builder}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_secure_password_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Application Server (Frontend + Backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dokploy
    container_name: mikrotik-app
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Database Configuration
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-mikrotik_config_builder}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres_secure_password_change_me}
      # Security
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-encryption-key-change-in-production}
      # CORS
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      # Optional integrations (leave blank if not using)
      - AT_API_KEY=${AT_API_KEY:-}
      - AT_USERNAME=${AT_USERNAME:-sandbox}
      - AT_SENDER_ID=${AT_SENDER_ID:-MyISP}
      - MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY:-}
      - MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET:-}
      - MPESA_SHORTCODE=${MPESA_SHORTCODE:-174379}
      - MPESA_PASSKEY=${MPESA_PASSKEY:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
    ports:
      - "3000:80"
    depends_on:
      postgres:
        condition: service_healthy
    # Improved startup with better error handling
    command: >
      sh -c "
        echo '=========================================' &&
        echo 'MikroTik Config Builder - Starting...' &&
        echo '=========================================' &&
        echo 'Database: $$DB_HOST:$$DB_PORT' &&
        echo 'Waiting for database...' &&
        for i in $(seq 1 120); do
          if nc -z $$DB_HOST $$DB_PORT 2>/dev/null; then
            echo 'Database connection successful!' &&
            break
          fi
          if [ $$i -eq 120 ]; then
            echo 'ERROR: Database not available after 120 attempts' &&
            exit 1
          fi
          echo 'Waiting for database... attempt $$i/120' &&
          sleep 2
        done &&
        echo 'Running database migrations...' &&
        cd /app/server &&
        (node src/db/migrate.js || echo 'WARNING: Migration failed, continuing...') &&
        (node src/db/seed.js || echo 'WARNING: Seed failed, continuing...') &&
        echo 'Starting application with supervisor...' &&
        exec /usr/bin/supervisord -c /etc/supervisor.d/supervisord.ini
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mikrotik-net
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M

volumes:
  pgdata:
    driver: local

networks:
  mikrotik-net:
    driver: bridge
